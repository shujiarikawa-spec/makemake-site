<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ｜マケマケ</title>
    <meta name="description" content="株式会社マケマケへのお問い合わせはこちらから。マーケティング支援のご相談、取材、協業に関するご連絡を受け付けております。">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
                        blue: { 50: '#eff6ff', 100: '#dbeafe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    },
                    fontFamily: { sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 selection:bg-blue-200">

    <!-- Header -->
    <header id="global-header"
        class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-white border-b border-slate-200 py-4">
        <div class="container mx-auto px-6 max-w-6xl flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 group cursor-pointer text-decoration-none">
                <div
                    class="w-8 h-8 bg-slate-900 rounded-sm flex items-center justify-center transition-transform group-hover:scale-105">
                    <i data-lucide="layers" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-wider text-slate-900">Makemake</span>
            </a>
            <nav class="hidden md:flex items-center gap-8">
                <a href="/structure.html"
                    class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">構造とは</a>
                <a href="/theory.html"
                    class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">理論</a>
                <a href="/services.html"
                    class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">支援モデル</a>
                <a href="/case-studies.html"
                    class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">事例</a>
            </nav>
            <div class="flex items-center gap-4">
                <a href="/diagnosis.html"
                    class="bg-blue-600 text-white text-sm font-medium px-5 py-2.5 rounded-sm hover:bg-blue-700 transition-all shadow-sm flex items-center gap-2">
                    売上構造診断 <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-24">
        <div class="container mx-auto px-6 max-w-3xl">
            <div class="text-center mb-12 reveal">
                <h1 class="text-3xl font-bold text-slate-900 mb-4 tracking-tight">お問い合わせ</h1>
                <p class="text-slate-600 leading-relaxed text-sm md:text-base">
                    自社のマーケティング課題を具体的に診断したい企業様は、<a href="/diagnosis.html"
                        class="text-blue-600 underline hover:text-blue-800 font-bold">売上構造診断</a>からお申し込みください。<br>
                    その他、取材や協業、一般的なご質問は下記のフォームよりお願いいたします。
                </p>
            </div>

            <div class="bg-white border border-slate-200 rounded-sm shadow-sm p-6 md:p-10 reveal overflow-hidden">
                <form action="https://formspree.io/f/xzdaqrgy" method="POST" class="space-y-6">

                    <!-- 任意：送信後の遷移先 -->
                    <input type="hidden" name="_redirect" value="/thanks-diagnosis.html">

                    <!-- 推奨：スパム対策 -->
                    <input type="text" name="_gotcha" style="display:none">

                    <div>
                        <label for="inquiry_type" class="block text-sm font-bold text-slate-900 mb-2">お問い合わせ種別 <span
                                class="text-red-500 ml-1">*</span></label>
                        <select id="inquiry_type" name="inquiry_type" required
                            class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="" disabled selected>選択してください</option>
                            <option value="consultation">自社のマーケティングに関するご相談</option>
                            <option value="partnership">協業・パートナーシップについて</option>
                            <option value="media">取材・講演のご依頼</option>
                            <option value="other">その他</option>
                        </select>
                    </div>

                    <!-- 以下そのままでOK -->

                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label for="company" class="block text-sm font-bold text-slate-900 mb-2">貴社名 <span
                                    class="text-red-500 ml-1">*</span></label>
                            <input type="text" id="company" name="company" required placeholder="株式会社マケマケ"
                                class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label for="name" class="block text-sm font-bold text-slate-900 mb-2">お名前 <span
                                    class="text-red-500 ml-1">*</span></label>
                            <input type="text" id="name" name="name" required placeholder="山田 太郎"
                                class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-bold text-slate-900 mb-2">メールアドレス <span
                                class="text-red-500 ml-1">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="info@example.com"
                            class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label for="message" class="block text-sm font-bold text-slate-900 mb-2">お問い合わせ内容 <span
                                class="text-red-500 ml-1">*</span></label>
                        <textarea id="message" name="message" rows="6" required placeholder="具体的な内容をご記入ください。"
                            class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
                    </div>

                    <div class="pt-4 text-center">
                        <p class="text-xs text-slate-500 mb-6">
                            送信することにより、弊社の<a href="/privacy.html" target="_blank"
                                class="text-blue-600 underline">プライバシーポリシー</a>に同意したものとみなされます。
                        </p>
                        <button type="submit"
                            class="bg-slate-900 text-white font-bold px-12 py-4 rounded-sm hover:bg-slate-800 transition-all shadow-sm w-full md:w-auto">
                            送信する
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="container mx-auto px-6 max-w-6xl flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2">
                <i data-lucide="layers" class="w-5 h-5 text-slate-900"></i>
                <span class="text-lg font-bold tracking-wider text-slate-900">Makemake</span>
            </div>
            <div class="flex gap-6 text-sm text-slate-500">
                <a href="/company.html" class="hover:text-slate-900 transition-colors">会社概要</a>
                <a href="/privacy.html" class="hover:text-slate-900 transition-colors">プライバシーポリシー</a>
                <a href="/contact.html" class="hover:text-slate-900 transition-colors">お問い合わせ</a>
            </div>
            <p class="text-xs text-slate-400">&copy; <span id="year"></span> Makemake Inc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売上構造診断｜マケマケ</title>
    <meta name="description" content="貴社の売上がどこで止まっているのか、構造的なボトルネックを可視化します。現状の課題をチェックシートに入力し、無料診断にお申し込みください。">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a',
                        },
                        blue: {
                            50: '#eff6ff', 100: '#dbeafe', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8',
                        }
                    },
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-100 {
            transition-delay: 100ms;
        }

        .delay-200 {
            transition-delay: 200ms;
        }

        /* Custom Checkbox Styles */
        .custom-checkbox input:checked+div {
            border-color: #2563eb;
            background-color: #eff6ff;
        }

        .custom-checkbox input:checked+div .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 selection:bg-blue-200">

    <!-- Header (Simplified for Conversion Page to prevent exit) -->
    <header id="global-header"
        class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-white border-b border-slate-200 py-4">
        <div class="container mx-auto px-6 max-w-4xl flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 group cursor-pointer text-decoration-none">
                <div
                    class="w-8 h-8 bg-slate-900 rounded-sm flex items-center justify-center transition-transform group-hover:scale-105">
                    <i data-lucide="layers" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-wider text-slate-900">Makemake</span>
            </a>
            <a href="/"
                class="text-sm font-medium text-slate-500 hover:text-slate-900 flex items-center gap-1 transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i> キャンセルして戻る
            </a>
        </div>
    </header>

    <main class="pt-24 pb-24">
        <div class="container mx-auto px-6 max-w-3xl">

            <!-- Header Text -->
            <div class="text-center mb-12 reveal">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="stethoscope" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900 mb-4 tracking-tight">売上構造診断のお申し込み</h1>
                <p class="text-slate-600 leading-relaxed text-sm md:text-base">
                    貴社のマーケティング活動における「見えないボトルネック」を可視化します。<br>
                    以下の項目にチェックを入れ、現状の課題をお知らせください。
                </p>
            </div>

            <!-- Form Wrapper -->
            <div class="bg-white border border-slate-200 rounded-sm shadow-sm p-6 md:p-10 reveal delay-100">
                <form action="https://formspree.io/f/xzdaqrgy" method="POST" class="space-y-10">

                    <!-- 任意：送信後の遷移先（作ってないなら削除OK） -->
                    <input type="hidden" name="_redirect" value="/thanks-diagnosis.html">

                    <!-- 推奨：スパム対策 -->
                    <input type="text" name="_gotcha" style="display:none">

                    <!-- Step 1: 課題のチェック（構造のどこが壊れているかの一次診断） -->
                    <div>
                        <div class="flex items-baseline gap-2 mb-4">
                            <span
                                class="bg-slate-900 text-white text-xs font-bold px-2 py-1 rounded-sm tracking-wider">STEP
                                1</span>
                            <h2 class="text-lg font-bold text-slate-900">当てはまる課題を選択してください（複数可）</h2>
                        </div>

                        <div class="grid md:grid-cols-2 gap-4">
                            <!-- Market/Strategy Issues -->
                            <label class="custom-checkbox cursor-pointer relative">
                                <input type="checkbox" name="issues[]" value="market" class="sr-only">
                                <div
                                    class="border border-slate-200 p-4 rounded-sm transition-all hover:border-blue-300">
                                    <div class="flex items-start gap-3">
                                        <div
                                            class="w-5 h-5 border border-slate-300 rounded-[3px] mt-0.5 flex items-center justify-center shrink-0 bg-white check-container">
                                            <i data-lucide="check"
                                                class="w-3.5 h-3.5 text-blue-600 opacity-0 scale-50 transition-all check-icon"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm text-slate-900 mb-1">競合との差別化が弱い</p>
                                            <p class="text-xs text-slate-500">価格競争になりがちで、自社の強み（USP）が言語化できていない。</p>
                                        </div>
                                    </div>
                                </div>
                            </label>

                            <!-- Creative Issues -->
                            <label class="custom-checkbox cursor-pointer relative">
                                <input type="checkbox" name="issues[]" value="creative" class="sr-only">
                                <div
                                    class="border border-slate-200 p-4 rounded-sm transition-all hover:border-blue-300 h-full">
                                    <div class="flex items-start gap-3">
                                        <div
                                            class="w-5 h-5 border border-slate-300 rounded-[3px] mt-0.5 flex items-center justify-center shrink-0 bg-white check-container">
                                            <i data-lucide="check"
                                                class="w-3.5 h-3.5 text-blue-600 opacity-0 scale-50 transition-all check-icon"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm text-slate-900 mb-1">メッセージが刺さらない</p>
                                            <p class="text-xs text-slate-500">LPや広告の反応率（CTR/CVR）が徐々に落ちてきている。</p>
                                        </div>
                                    </div>
                                </div>
                            </label>

                            <!-- Funnel/CPA Issues -->
                            <label class="custom-checkbox cursor-pointer relative">
                                <input type="checkbox" name="issues[]" value="funnel" class="sr-only">
                                <div
                                    class="border border-slate-200 p-4 rounded-sm transition-all hover:border-blue-300 h-full">
                                    <div class="flex items-start gap-3">
                                        <div
                                            class="w-5 h-5 border border-slate-300 rounded-[3px] mt-0.5 flex items-center justify-center shrink-0 bg-white check-container">
                                            <i data-lucide="check"
                                                class="w-3.5 h-3.5 text-blue-600 opacity-0 scale-50 transition-all check-icon"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm text-slate-900 mb-1">CPA（獲得単価）の高騰</p>
                                            <p class="text-xs text-slate-500">広告費を増やしても獲得数が伸びず、利益を圧迫している。</p>
                                        </div>
                                    </div>
                                </div>
                            </label>

                            <!-- Disconnected Tactics -->
                            <label class="custom-checkbox cursor-pointer relative">
                                <input type="checkbox" name="issues[]" value="disconnected" class="sr-only">
                                <div
                                    class="border border-slate-200 p-4 rounded-sm transition-all hover:border-blue-300 h-full">
                                    <div class="flex items-start gap-3">
                                        <div
                                            class="w-5 h-5 border border-slate-300 rounded-[3px] mt-0.5 flex items-center justify-center shrink-0 bg-white check-container">
                                            <i data-lucide="check"
                                                class="w-3.5 h-3.5 text-blue-600 opacity-0 scale-50 transition-all check-icon"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm text-slate-900 mb-1">施策が点になっている</p>
                                            <p class="text-xs text-slate-500">SEO、SNS、広告など色々やっているが、全体として繋がっていない。</p>
                                        </div>
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Step 2: 企業情報（フィルタリング含む） -->
                    <div>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span
                                class="bg-slate-900 text-white text-xs font-bold px-2 py-1 rounded-sm tracking-wider">STEP
                                2</span>
                            <h2 class="text-lg font-bold text-slate-900">企業情報をご入力ください</h2>
                        </div>

                        <div class="space-y-6">
                            <!-- 年商規模 (Targeting criteria from specs) -->
                            <div>
                                <label for="revenue" class="block text-sm font-bold text-slate-900 mb-2">現在の年商規模（目安）
                                    <span class="text-red-500 ml-1">*</span></label>
                                <select id="revenue" name="revenue" required
                                    class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white appearance-none">
                                    <option value="" disabled selected>選択してください</option>
                                    <option value="under_100m">1億円未満</option>
                                    <option value="100m_300m">1億円 〜 3億円</option>
                                    <option value="300m_500m">3億円 〜 5億円</option>
                                    <option value="500m_1b">5億円 〜 10億円</option>
                                    <option value="over_1b">10億円以上</option>
                                </select>
                                <p class="text-xs text-slate-500 mt-2">※マケマケは主に年商1億〜10億の企業様に特化した構造設計を提供しています。</p>
                            </div>

                            <div class="grid md:grid-cols-2 gap-6">
                                <div>
                                    <label for="company_name" class="block text-sm font-bold text-slate-900 mb-2">貴社名
                                        <span class="text-red-500 ml-1">*</span></label>
                                    <input type="text" id="company_name" name="company_name" required
                                        placeholder="株式会社〇〇"
                                        class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                </div>
                                <div>
                                    <label for="company_url"
                                        class="block text-sm font-bold text-slate-900 mb-2">コーポレート・サービスサイトURL <span
                                            class="text-red-500 ml-1">*</span></label>
                                    <input type="url" id="company_url" name="company_url" required
                                        placeholder="https://..."
                                        class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                </div>
                            </div>

                            <div class="grid md:grid-cols-2 gap-6">
                                <div>
                                    <label for="name" class="block text-sm font-bold text-slate-900 mb-2">ご担当者名 <span
                                            class="text-red-500 ml-1">*</span></label>
                                    <input type="text" id="name" name="name" required placeholder="山田 太郎"
                                        class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                </div>
                                <div>
                                    <label for="department"
                                        class="block text-sm font-bold text-slate-900 mb-2">部署・役職</label>
                                    <input type="text" id="department" name="department" placeholder="マーケティング部 部長"
                                        class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                </div>
                            </div>

                            <div>
                                <label for="email" class="block text-sm font-bold text-slate-900 mb-2">メールアドレス（会社用）
                                    <span class="text-red-500 ml-1">*</span></label>
                                <input type="email" id="email" name="email" required placeholder="yamada@example.com"
                                    class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>

                            <div>
                                <label for="detail"
                                    class="block text-sm font-bold text-slate-900 mb-2">具体的な課題やご相談内容（任意）</label>
                                <textarea id="detail" name="detail" rows="4"
                                    placeholder="現在のCPAが〇〇円で高止まりしており、来期の目標達成に向けて構造から見直したいと考えています。"
                                    class="w-full border border-slate-300 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-y"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- 成果連動オプションの確認 -->
                    <div class="bg-blue-50 border border-blue-200 rounded-sm p-6 mt-8">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <input type="checkbox" name="performance_based" value="yes"
                                class="mt-1 w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                            <div>
                                <span
                                    class="block text-sm font-bold text-slate-900 mb-1">成果連動型支援（レベニューシェア等）の提案も希望する</span>
                                <span
                                    class="block text-xs text-slate-600 leading-relaxed">マケマケがリスクを共有し、貴社の売上や利益に連動して報酬を設計するプランです。適用には一定の条件クリアと審査が必要です。<a
                                        href="/performance.html" target="_blank"
                                        class="text-blue-600 underline hover:text-blue-800 ml-1">条件を確認する</a></span>
                            </div>
                        </label>
                    </div>

                    <!-- Privacy & Submit -->
                    <div class="pt-6 text-center">
                        <p class="text-xs text-slate-500 mb-6">
                            送信することにより、弊社の<a href="/privacy.html" target="_blank"
                                class="text-blue-600 underline">プライバシーポリシー</a>に同意したものとみなされます。
                        </p>
                        <button type="submit"
                            class="bg-slate-900 text-white font-bold px-12 py-4 rounded-sm hover:bg-slate-800 transition-all shadow-md hover:shadow-lg w-full md:w-auto text-lg flex items-center justify-center gap-2 mx-auto group">
                            入力内容を確認して送信する
                            <i data-lucide="arrow-right"
                                class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </div>

                </form>
            </div>

            <div class="text-center mt-8 reveal delay-200">
                <p class="text-xs text-slate-400">
                    ※同業他社様からのご相談・調査目的と判断される場合は、お断りさせていただく場合がございます。
                </p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        lucide.createIcons();

        // Simple Intersection Observer for intro animation
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach((el) => {
                observer.observe(el);
            });
        });
    </script>
</body>

</html>
